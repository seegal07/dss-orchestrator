            - "Сделать правило: без зелёного CI нельзя мёржить."
          D_assumptions_constraints:
            - "CI инфраструктура доступна."
          E_risks_failures:
            - "CI станет медленным."
          F_metrics:
            leading:
              - "% зелёного CI"
              - "время CI"
              - "дефекты пойманы до релиза"
            lagging:
              - "дефекты на релиз"
              - "переработки"
          G_experiment:
            timebox: "3 недели"
            budget: "0–300 EUR"
            pass_criteria: "Дефекты ↓ ≥15% без роста времени CI > 20%"

  - artifact_type: SECONDARY_CONTRADICTION_CHECK
    pipeline_step: 11
    payload:
      new_contradiction_exists: false

  - artifact_type: DECISION_RECORD
    pipeline_step: 12
    payload:
      chosen_concept_index: 1
      chosen_concept_name: "Лимиты WIP + stop-starting"
      reasons:
        - "Быстрый эффект без найма."
        - "Лечит корень — потери на переключениях."
      success_criteria:
        - "WIP/чел ↓"
        - "Cycle time ↓ ≥15%"
        - "Переработки ↓ ≥10%"

