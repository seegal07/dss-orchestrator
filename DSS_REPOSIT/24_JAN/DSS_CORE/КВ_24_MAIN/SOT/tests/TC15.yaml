          B_axis_and_resource: "Ось: снижение вариативности; ресурс: стандарты"
          C_mechanism_steps:
            - "Сделать DoD и шаблоны для 5 типовых задач."
            - "Ввести обязательное использование шаблонов."
          D_assumptions_constraints:
            - "Шаблоны не добавляют бюрократии."
          E_risks_failures:
            - "Шаблоны будут игнорироваться."
          F_metrics:
            leading:
              - "доля задач по шаблону"
              - "число возвратов на доработку"
            lagging:
              - "дефекты"
              - "cycle time"
          G_experiment:
            timebox: "4 недели"
            budget: "0 EUR"
            pass_criteria: "Возвраты на доработку ↓ ≥20%"
