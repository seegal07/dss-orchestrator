test_case_id: TC15
status: FILLED
mode: artifact_pack
canon_versions:
  canon_pipeline: CANON_PIPELINE_v1.2.docx
  canon_9forms: CANON_9FORMS_v1.1.docx
  schema: TEST_VECTOR_SCHEMA_v0.1.md.docx
notes: "patched vector"

artifact_pack:
  - artifact_type: CASE_SYMPTOM
    pipeline_step: 0
    payload:
      symptom_1l: "В проектной команде растёт переработка и выгорание, но срок выпуска не ускоряется; люди параллелят слишком много задач."

  - artifact_type: PROBLEM_OWNER_CARD
    pipeline_step: 1
    payload:
      owner_role: "Руководитель направления / Delivery Manager"
      owner_scope: "Может менять правила WIP, приоритизацию, формат планирования, распределение задач и политику «стоп-начала»."
      constraints:
        - "Нельзя увеличивать штат команды"
        - "Нельзя сдвигать дедлайн релиза"
        - "Нельзя вводить микроменеджмент по минутам"
      success_metric_hint: "WIP на человека, cycle time, переработки (ч/неделя), дефекты."

  - artifact_type: SYSTEM_BOUNDARY_MAP
    pipeline_step: 2
    payload:
      actor:
        - "Разработчики"
        - "Тимлид"
        - "Delivery Manager"
        - "Бэклог/таск-трекер"
        - "Стейкхолдеры"
      system:
        - "Процесс планирования и приоритизации"
        - "Правила WIP и переключения контекста"
      environment:
        - "Дедлайн релиза"
        - "Внешние зависимости"
        - "Ожидания бизнеса"
      boundary_note_1l: "Симптом возникает из-за дефицита управляемого ресурса внимания/фокуса в условиях фиксированного дедлайна."

  - artifact_type: INTERACTION_MAP
    pipeline_step: 3
    payload:
      elements:
        - "Бэклог"
        - "WIP"
        - "Переключение контекста"
        - "Дедлайн релиза"
        - "Качество (дефекты)"
      flows:
        - from: "Стейкхолдеры"
          to: "Бэклог"
          type: info
          note: "новые запросы/приоритеты"
        - from: "Delivery Manager"
          to: "WIP"
          type: org
          note: "назначение задач и параллельность"
        - from: "WIP"
          to: "Переключение контекста"
          type: time
          note: "потери времени на переключение"
        - from: "Переключение контекста"
          to: "Качество (дефекты)"
          type: risk
          note: "ошибки и переделки"
      symptom_location: "В узле «WIP → переключение контекста»: растёт переработка без ускорения поставки."

  - artifact_type: CONTRADICTION_STATEMENT
    pipeline_step: 4
    payload:
      improve_x: "Скорость поставки (выпуск к дедлайну)"
      worsen_y: "Нагрузка и качество (переработки и дефекты)"
      statement_1l: "Если увеличиваем скорость через параллельность, растут переработки и дефекты; если ограничиваем нагрузку, кажется, что скорость падает."
      measurement_hint: "X=% задач в релиз; Y=переработки/неделя + дефекты."

  - artifact_type: IKR_CARD
    pipeline_step: 5
    payload:
      ikr_1l: "Команда поставляет больше к релизу без переработок и без роста дефектов."
      no_new_harm_clause: "Без микроменеджмента времени."

  - artifact_type: HARD_BARRIER
    pipeline_step: 6
    payload:
      barrier_1l: "Нельзя держать много задач в работе и сохранять высокий фокус без потерь и дефектов."
      equivalent_to_step4: true

  - artifact_type: RESOURCE_MAP
    pipeline_step: 7
    payload:
      resources:
        - name: "Фокус внимания разработчика"
          category: time
          tied_to: "Переключение контекста"
          note: "теряется при параллельности"
        - name: "Лимит WIP как правило"
          category: org
          tied_to: "WIP"
          note: "формализуем 1–2 задачи"
        - name: "Статистика cycle time по задачам"
          category: info
          tied_to: "Бэклог/таск-трекер"
          note: "видим где узкие места"
        - name: "Буфер релиза (критический путь)"
          category: time
          tied_to: "Дедлайн релиза"
          note: "защищаем от «вбросов»"
        - name: "Шаблоны DoD"
          category: org
          tied_to: "Качество (дефекты)"
          note: "уменьшают переделки"
        - name: "CI/автотесты"
          category: info
          tied_to: "Качество (дефекты)"
          note: "самопроверка"
        - name: "Правило stop-starting"
          category: org
          tied_to: "WIP"
          note: "новое только после завершения"
        - name: "Приоритет Top-3"
          category: org
          tied_to: "Бэклог"
          note: "фиксирует фокус"
        - name: "Договорённость со стейкхолдерами о входящем потоке"
          category: trust
          tied_to: "Стейкхолдеры"
          note: "снижает шум"

  - artifact_type: FORM_SELECTION
    pipeline_step: 8
    payload:
      PRIMARY_FORM: "№6 Ресурсоэффективность"
      BOUNDARY_CHECK:
        NEAREST_FORMS:
          - "№6 Ресурсоэффективность"
          - "№1 Дифференциация"
        WHY_NOT_X:
          - "Ключ — дефицитный ресурс фокуса и потока; его надо экономить."
          - "Меньше WIP ускоряет завершение без найма."
        WHY_NOT_Y:
          - "Дробление задач полезно, но не лечит потери от переключений."
          - "Сначала управляем ресурсом потока, потом оптимизируем структуру."
      D_MARKER: "D5"
      TRIZ_CORE:
        CONTRADICTION_1L: "нужно делать много параллельно, но нужно сохранять фокус"
        IKR_1L: "поток ускоряется при меньшем WIP"
      PRINCIPLES_TO_ACTION:
        PRINCIPLES: [6, 25, 12]
        ACTIONS:
          - "06: Универсальность — стандартизировать DoD и шаблоны задач."
          - "25: Самообслуживание — автоматизировать проверки через CI."
          - "12: Эквипотенциальность — выровнять нагрузку через Top-3 и stop-starting."
      IKR_TEST:
        Q1: "YES — WIP лимиты высвобождают фокус."
        Q2: "YES — CI снижает дефекты без роста нагрузки."
      CONFIDENCE:
        score: 74
        justification: "Есть данные в таск-трекере; правила WIP в контроле владельца."

  - artifact_type: SOLUTION_SET
    pipeline_step: 9
    payload:
      count_rule: "3–5"
      concepts:
        - concept_index: 1
          name: "Лимиты WIP + stop-starting"
          idea_1l: "Ввести WIP=1–2 на человека и правило: новая задача только после завершения текущей."
          linked_form: "№6 Ресурсоэффективность"
          linked_principles: [12]
          linked_resources:
            - "Лимит WIP как правило"
            - "Фокус внимания разработчика"
            - "Правило stop-starting"
          ikr_alignment_1l: "Ускорение потока за счёт меньших потерь на переключение."
        - concept_index: 2
          name: "Стандартизированный DoD + шаблоны"
          idea_1l: "Унифицировать DoD и шаблоны задач, чтобы уменьшить переделки."
          linked_form: "№6 Ресурсоэффективность"
          linked_principles: [6]
          linked_resources:
            - "Шаблоны DoD"
            - "Статистика cycle time по задачам"
          ikr_alignment_1l: "Меньше переделок — больше свободного ресурса."
        - concept_index: 3
          name: "Автопроверки в CI"
          idea_1l: "Сделать обязательными автопроверки в CI, чтобы снизить дефекты и ручной контроль."
          linked_form: "№6 Ресурсоэффективность"
          linked_principles: [25]
          linked_resources:
            - "CI/автотесты"
            - "Шаблоны DoD"
          ikr_alignment_1l: "Качество растёт без переработок."

