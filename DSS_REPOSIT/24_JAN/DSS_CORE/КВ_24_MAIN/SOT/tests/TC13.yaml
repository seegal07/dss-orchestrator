test_case_id: TC13
status: FILLED
mode: artifact_pack
canon_versions:
  canon_pipeline: CANON_PIPELINE_v1.2.docx
  canon_9forms: CANON_9FORMS_v1.1.docx
  schema: TEST_VECTOR_SCHEMA_v0.1.md.docx
notes: "patched vector"

artifact_pack:
  - artifact_type: CASE_SYMPTOM
    pipeline_step: 0
    payload:
      symptom_1l: "Конверсия из первичного лида в оплату падает; менеджеры тратят много времени на ручной подбор программы и повторные уточнения."

  - artifact_type: PROBLEM_OWNER_CARD
    pipeline_step: 1
    payload:
      owner_role: "Руководитель продаж / Head of Sales (EdTech)"
      owner_scope: "Может менять правила квалификации лида, скрипты, этапы воронки, порядок передачи лида, шаблоны КП и механизмы обратной связи от обучения к продажам."
      constraints:
        - "Нельзя нанимать новых менеджеров и аналитиков"
        - "Нельзя внедрять новую CRM в ближайшие 2 месяца"
        - "Нельзя ухудшать качество подбора программы (рост возвратов/отказов недопустим)"
      success_metric_hint: "Конверсия lead→pay, среднее время менеджера на один лид, доля возвратов в первые 14 дней."

  - artifact_type: SYSTEM_BOUNDARY_MAP
    pipeline_step: 2
    payload:
      actor:
        - "Lead (клиент)"
        - "Менеджер продаж"
        - "Методист/академический куратор"
        - "CRM/таблица лидов"
        - "Учебная программа/расписание"
      system:
        - "Процесс квалификации и подбора программы"
        - "Скрипты и шаблоны КП"
        - "Канал обратной связи от обучения к продажам"
      environment:
        - "Маркетинговые источники трафика"
        - "Конкуренты и рынок"
        - "Ограничения по времени ответа"
      boundary_note_1l: "Симптом проявляется на стыке «качество подбора» и «скорость обработки лида»."

  - artifact_type: INTERACTION_MAP
    pipeline_step: 3
    payload:
      elements:
        - "Лид (контакт + запрос)"
        - "Квалификация"
        - "Подбор программы"
        - "КП/офер"
        - "Оплата"
        - "Обратная связь по качеству обучения"
      flows:
        - from: "Lead"
          to: "Менеджер продаж"
          type: info
          note: "запрос и ограничения клиента"
        - from: "Менеджер продаж"
          to: "CRM/таблица лидов"
          type: info
          note: "фиксация квалификации и статуса"
        - from: "Менеджер продаж"
          to: "Учебная программа/расписание"
          type: time
          note: "проверка доступных стартов/слотов"
        - from: "Методист/куратор"
          to: "Менеджер продаж"
          type: info
          note: "типовые причины отказов и возвратов"
        - from: "Менеджер продаж"
          to: "Lead"
          type: info
          note: "КП/варианты программ + условия"
        - from: "Lead"
          to: "Оплата"
          type: money
          note: "платёж / отказ"
      symptom_location: "В узле «Подбор программы → КП»: много итераций уточнений, растёт время ответа и падает конверсия."

  - artifact_type: CONTRADICTION_STATEMENT
    pipeline_step: 4
    payload:
      improve_x: "Скорость обработки лида (время до отправки релевантного КП)"
      worsen_y: "Точность подбора программы (риск возвратов/неподходящего курса)"
      statement_1l: "Если увеличиваем скорость обработки лида, ухудшается точность подбора программы; если увеличиваем точность, падает скорость и конверсия."
      measurement_hint: "X=медиана минут до КП; Y=% возвратов/отказов из-за несоответствия ожиданий."

  - artifact_type: IKR_CARD
    pipeline_step: 5
    payload:
      ikr_1l: "Клиент получает релевантное предложение почти сразу, а качество подбора не падает."
      no_new_harm_clause: "Без роста возвратов и без увеличения нагрузки на менеджеров."

  - artifact_type: HARD_BARRIER
    pipeline_step: 6
    payload:
      barrier_1l: "Нельзя одновременно давать персонально точное КП и тратить на лид минимальное время."
      equivalent_to_step4: true

  - artifact_type: RESOURCE_MAP
    pipeline_step: 7
    payload:
      resources:
        - name: "История прошлых сделок (успешные/неуспешные)"
          category: info
          tied_to: "CRM/таблица лидов"
          note: "паттерны: какой запрос → какая программа → результат"
        - name: "FAQ по программам и типовым ограничениям"
          category: info
          tied_to: "Скрипты и шаблоны КП"
          note: "готовые ответы для ускорения"
        - name: "Шаблоны КП по сегментам"
          category: org
          tied_to: "КП/офер"
          note: "структура и блоки предложения"
        - name: "Автоматические теги источника лида"
          category: info
          tied_to: "Квалификация"
          note: "сигнал ожиданий по каналу"
        - name: "Календарь стартов и загрузки групп"
          category: time
          tied_to: "Учебная программа/расписание"
          note: "быстрый выбор ближайшего старта"
        - name: "Чек-лист квалификации (5 вопросов)"
          category: org
          tied_to: "Квалификация"
          note: "минимальный набор данных для подбора"
        - name: "Обратная связь от кураторов по причинам возвратов"
          category: info
          tied_to: "Обратная связь по качеству обучения"
          note: "снижает риск неверного подбора"
        - name: "Библиотека кейсов выпускников"
          category: trust
          tied_to: "КП/офер"
          note: "усиливает решение без долгих переписок"
        - name: "Запись звонка/чат-лог первого контакта"
          category: info
          tied_to: "Лид (контакт + запрос)"
          note: "материал для извлечения требований"

  - artifact_type: FORM_SELECTION
    pipeline_step: 8
    payload:
      PRIMARY_FORM: "№8 Кибернетика"
      BOUNDARY_CHECK:
        NEAREST_FORMS:
          - "№2 Динамизация"
          - "№8 Кибернетика"
        WHY_NOT_X:
          - "Проблема не в скорости операций как таковой, а в отсутствии управляемой обратной связи по качеству подбора."
          - "Динамизация ускорит шаги, но без контуров контроля увеличит возвраты."
        WHY_NOT_Y:
          - "Решение требует не только контроля, но и частичной автоматизации/копирования удачных паттернов."
          - "Нужны сигналы качества и быстрые корректировки скриптов."
      D_MARKER: "D1"
      TRIZ_CORE:
        CONTRADICTION_1L: "нужно отвечать быстро, но нужно отвечать точно"
        IKR_1L: "КП формируется быстро и остаётся точным без ручной доработки"
      PRINCIPLES_TO_ACTION:
        PRINCIPLES: [23, 26, 16]
        ACTIONS:
          - "23: Ввести короткий контур обратной связи: причины отказов/возвратов → корректировка чек-листа и шаблонов КП каждую неделю."
          - "26: Копировать успешные связки «сегмент запроса → программа → аргументы КП» в виде готовых пресетов."
          - "16: Делать частичное предложение сразу: 1 основной вариант + 1 запасной, вместо долгого полного подбора."
      IKR_TEST:
        Q1: "YES — качество контролируется через регулярную обратную связь и метрики возвратов."
        Q2: "YES — скорость достигается пресетами и частичным предложением."
      CONFIDENCE:
        score: 72
        justification: "Есть данные прошлых сделок и возвратов; ограничение по CRM компенсируется пресетами и регламентом."

  - artifact_type: SOLUTION_SET
    pipeline_step: 9
    payload:
      count_rule: "3–5"
      concepts:
        - concept_index: 1
          name: "Пресеты КП по сегментам"
          idea_1l: "Собрать 10–15 пресетов КП: сегмент → программа → аргументы/кейсы → ближайший старт."
          linked_form: "№8 Кибернетика"
          linked_principles: [26, 16]
          linked_resources:
            - "История прошлых сделок (успешные/неуспешные)"
            - "Шаблоны КП по сегментам"
            - "Календарь стартов и загрузки групп"
          ikr_alignment_1l: "КП формируется быстро из готовых блоков без потери релевантности."
        - concept_index: 2
          name: "Контур обратной связи качества подбора"
          idea_1l: "Еженедельно собирать причины отказов/возвратов и обновлять чек-лист и пресеты."
          linked_form: "№8 Кибернетика"
          linked_principles: [23]
          linked_resources:
            - "Обратная связь от кураторов по причинам возвратов"
            - "FAQ по программам и типовым ограничениям"
            - "Запись звонка/чат-лог первого контакта"
          ikr_alignment_1l: "Точность поддерживается за счёт регулярной корректировки правил."
        - concept_index: 3
          name: "Двухвариантное КП (основное + запасное)"
          idea_1l: "Сразу предлагать 2 варианта: релевантный и безопасный, чтобы снизить число уточнений."
          linked_form: "№8 Кибернетика"
          linked_principles: [16]
          linked_resources:
            - "Чек-лист квалификации (5 вопросов)"
            - "Библиотека кейсов выпускников"
            - "Шаблоны КП по сегментам"
          ikr_alignment_1l: "Скорость растёт, а точность страхуется запасным вариантом."

  - artifact_type: MECHANISM_SPECS
    pipeline_step: 10
    payload:
      concept_specs:
        - concept_index: 1
          A_name_tagline: "Пресеты КП — «собираем КП за 2 минуты»"
          B_axis_and_resource: "Ось: скорость обработки; ресурс: история сделок + шаблоны КП"
          C_mechanism_steps:
            - "Выгрузить 100 последних сделок и сгруппировать по сегменту запроса."
            - "Для каждого сегмента зафиксировать: программа, аргументы, кейс, ближайший старт."
            - "Собрать шаблон КП с переменными полями."
            - "Обучить менеджеров: выбор пресета + минимальная персонализация."
          D_assumptions_constraints:
            - "Сегменты запросов устойчивы хотя бы 4 недели."
            - "Есть доступ к истории сделок и календарю стартов."
          E_risks_failures:
            - "Сегментация окажется слишком грубой → падение точности."
            - "Менеджеры будут «жить по шаблону» и игнорировать уникальные ограничения клиента."
          F_metrics:
            leading:
              - "% лидов с КП ≤ 30 минут"
              - "доля использования пресетов"
              - "среднее число уточнений до оплаты"
            lagging:
              - "конверсия lead→pay"
              - "% возвратов в 14 дней"
          G_experiment:
            timebox: "2 недели"
            budget: "0–200 EUR (внутреннее время + шаблоны)"
            pass_criteria: "КП ≤30 мин для ≥60% лидов без роста % возвратов"
        - concept_index: 2
          A_name_tagline: "Контур качества — «каждую неделю улучшаем правила подбора»"
          B_axis_and_resource: "Ось: точность подбора; ресурс: причины отказов/возвратов + обратная связь кураторов"
          C_mechanism_steps:
            - "Определить 5 категорий причин отказов/возвратов."
            - "Еженедельно собирать 20 примеров и отмечать причины."
            - "Обновлять чек-лист квалификации и пресеты."
            - "Делать короткий разбор 15 минут на планёрке."
          D_assumptions_constraints:
            - "Кураторы готовы давать обратную связь 1 раз в неделю."
            - "Причины отказов фиксируются честно."
          E_risks_failures:
            - "Данные причин будут шумные/неполные."
            - "Изменения правил будут слишком частыми → путаница у менеджеров."
          F_metrics:
            leading:
              - "доля сделок с отмеченной причиной отказа"
              - "число обновлений пресетов/месяц"
              - "время ответа на запрос"
            lagging:
              - "% возвратов"
              - "конверсия lead→pay"
          G_experiment:
            timebox: "4 недели"
            budget: "0 EUR (регламент + дисциплина)"
            pass_criteria: "Снижение возвратов на ≥10% при сохранении/росте конверсии"
        - concept_index: 3
          A_name_tagline: "2 варианта КП — «меньше переписки»"
          B_axis_and_resource: "Ось: сокращение итераций; ресурс: пресеты + чек-лист 5 вопросов"
          C_mechanism_steps:
            - "Сделать правило: всегда отправлять основной и запасной вариант."
            - "Запасной вариант выбирать по «безопасному» профилю."
            - "В письме задавать 2 уточняющих вопроса максимум."
          D_assumptions_constraints:
            - "Есть минимум данных от лида (5 вопросов)."
            - "Запасной вариант не должен противоречить запросу."
          E_risks_failures:
            - "Клиент запутается из-за двух вариантов."
            - "Запасной вариант снизит perceived fit и конверсию."
          F_metrics:
            leading:
              - "среднее число сообщений до оплаты"
              - "время до первого КП"
              - "доля лидов с двумя вариантами"
            lagging:
              - "конверсия lead→pay"
              - "% возвратов"
          G_experiment:
            timebox: "2 недели"
            budget: "0 EUR"
            pass_criteria: "Снижение сообщений до оплаты на ≥20% без падения конверсии"

  - artifact_type: SECONDARY_CONTRADICTION_CHECK
    pipeline_step: 11
    payload:
      new_contradiction_exists: false

  - artifact_type: DECISION_RECORD
    pipeline_step: 12
    payload:
      chosen_concept_index: 1
      chosen_concept_name: "Пресеты КП по сегментам"
      reasons:
        - "Дает быстрый выигрыш по времени ответа без изменений CRM."
        - "Поддерживается контуром качества (концепт 2) как вторым шагом."
      rejected_alternatives:
        - concept_index: 2
          concept: "Контур обратной связи качества подбора"
          why_rejected: "Нужен для устойчивости, но сам по себе не ускоряет первую неделю."
        - concept_index: 3
          concept: "Двухвариантное КП"
          why_rejected: "Полезно, но без пресетов не решает скорость."
      assumptions:
        - "Сегментация запросов повторяема."
      success_criteria:
        - "КП ≤30 минут для ≥60% лидов"
        - "Конверсия lead→pay не падает"

  - artifact_type: IMPLEMENTATION_MAP
    pipeline_step: 13
    payload:
      workstreams:
        - name: "Пресеты и шаблоны"
          owner: "Head of Sales"
          tasks:
            - task: "Собрать сегменты запросов и 10 пресетов КП"
              due: "2026-02-10"
              dependency: "доступ к истории сделок"
              checkpoint_metric: "10 пресетов готовы"
            - task: "Обучить менеджеров использованию пресетов"
              due: "2026-02-14"
              dependency: "пресеты готовы"
              checkpoint_metric: "% использования пресетов ≥60%"
        - name: "Контур качества"
          owner: "Куратор обучения"
          tasks:
            - task: "Определить категории причин отказов/возвратов"
              due: "2026-02-12"
              dependency: "нет"
              checkpoint_metric: "категории утверждены"

  - artifact_type: RULE_UPDATE
    pipeline_step: 14
    payload:
      rule_id: "CASE-RULE-TC13-01"
      rule_statement_if_then: "Если время до первого КП > 30 минут, то менеджер обязан использовать пресет КП и отправить основной+запасной вариант."
      criterion: "Порог по времени ответа измеряется по таймстампу первого КП."
      boundaries: "Применимо к B2C-лидам стандартных программ; не применимо к корпоративным кастомным запросам."
      evidence_from_case: "Симптом: рост времени на ручной подбор снижает конверсию."
      test_case_action:
        add_or_update: add
        test_case_id: TC13
        expected_effect: "время ответа ↓, конверсия ↑ без роста возвратов"
      version_note: "NON-CANON case rule; canon unchanged"
      rationale_1l: "Пресеты и контур обратной связи дают скорость без потери качества."
