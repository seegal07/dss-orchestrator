    pipeline_step: 9
    payload:
      count_rule: "3–5"
      concepts:
        - concept_index: 1
          name: "Risk Boundary Matrix"
          idea_1l: "классифицировать решения по риску и заранее определить границы эскалации"
          linked_form: "№6 Ресурсоэффективность"
          linked_principles: [6, 25]
          linked_resources:
            - "Existing compliance checklist"
            - "Risk classification categories"
            - "Escalation logs"
          ikr_alignment_1l: "эскалации только по классификации риска"
        - concept_index: 2
          name: "Pre-approved Playbooks"
          idea_1l: "создать 10 playbooks для типовых решений с разрешёнными параметрами"
          linked_form: "№6 Ресурсоэффективность"
          linked_principles: [6]
          linked_resources:
            - "Existing meetings (no new rituals)"
            - "Customer contract clauses"
          ikr_alignment_1l: "типовые решения без согласований"
        - concept_index: 3
          name: "Escalate-by-Red-Flag"
          idea_1l: "эскалация только при красном флаге; иначе решение на уровне менеджера"
          linked_form: "№6 Ресурсоэффективность"
          linked_principles: [25]
          linked_resources:
            - "Existing compliance checklist"
            - "CEO time as scarce resource"
          ikr_alignment_1l: "CEO включается только по red flag"

  - artifact_type: MECHANISM_SPECS
    pipeline_step: 10
    payload:
      concept_specs:
        - concept_index: 1
          A_name_tagline: "Risk Boundary Matrix — границы решения"
          B_axis_and_resource: "ось: autonomy vs compliance risk; ресурс: чек-лист red flags"
          C_mechanism_steps:
            - "Определить 3 уровня риска и критерии (green/yellow/red)"
            - "Для каждого уровня задать: кто решает, какие документы нужны, когда эскалация"
            - "Встроить правило в текущий процесс согласований (без новых встреч)"
          D_assumptions_constraints:
            - "оргструктура не меняется; бюджет 0"
          E_risks_failures:
            - "слишком много красных флагов → возврат к старому"
          F_metrics:
            leading:
              - "% решений с заполненной классификацией риска"
              - "% решений green/yellow без эскалации"
            lagging:
              - "# комплаенс инцидентов"
              - "время CEO на согласования/нед"
          G_experiment:
            timebox: "2 недели"
            budget: "0"
            pass_criteria: "≥70% решений имеют риск-класс; эскалации ↓ на 30% без роста инцидентов"
        - concept_index: 2
          A_name_tagline: "Pre-approved Playbooks — типовые решения"
          B_axis_and_resource: "ось: speed vs risk; ресурс: playbook шаблоны"
          C_mechanism_steps:
            - "Собрать top-10 типовых решений из эскалаций"
            - "Для каждого описать допустимые параметры и owner"
            - "Опубликовать playbooks и запретить эскалации по этим типам"
          D_assumptions_constraints:
            - "достаточно 10 первых playbooks"
          E_risks_failures:
            - "playbooks устаревают без владельца"
          F_metrics:
            leading:
              - "# созданных playbooks"
              - "% решений, покрытых playbooks"
            lagging:
              - "снижение эскалаций по типовым темам"
              - "# исключений/нарушений"
          G_experiment:
            timebox: "3 недели"
            budget: "0"
            pass_criteria: "10 playbooks, ≥40% типовых решений без эскалации"
        - concept_index: 3
          A_name_tagline: "Escalate-by-Red-Flag — эскалация по правилу"
          B_axis_and_resource: "ось: ответственность vs страх; ресурс: red flag список"
          C_mechanism_steps:
            - "Согласовать 7 красных флагов комплаенса"
            - "Если red flag = true → эскалация; иначе — решение менеджера"
            - "Логировать каждый red flag кейс для обучения"
          D_assumptions_constraints:
            - "флаги должны быть бинарны"
          E_risks_failures:
            - "менеджеры обходят флаги"
          F_metrics:
            leading:
              - "# решений с red-flag check"
              - "# red-flag true/нед"
            lagging:
              - "# комплаенс инцидентов"
              - "время CEO на согласования"
          G_experiment:
            timebox: "2 недели"
            budget: "0"
            pass_criteria: "100% решений проходят red-flag check; инциденты не растут"

  - artifact_type: SECONDARY_CONTRADICTION_CHECK
