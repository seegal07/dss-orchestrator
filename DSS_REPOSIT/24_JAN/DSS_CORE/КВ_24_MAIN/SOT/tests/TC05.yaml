        - "Compliance/Legal"
        - "Teams"
      system:
        - "Delegation + escalation boundary system"
      environment:
        - "Regulators/contractual obligations"
        - "Customers"
      boundary_note_1l: "Symptom sits at the boundary between delegated decisions and escalation triggers (risk management)."

  - artifact_type: INTERACTION_MAP
    pipeline_step: 3
    payload:
      elements:
        - "CEO"
        - "Managers"
        - "Risk/Compliance checklist"
        - "Escalation channel"
        - "Teams"
      flows:
        - from: "Managers"
          to: "Teams"
          type: info
          note: "task decisions"
        - from: "Teams"
          to: "Managers"
          type: info
          note: "requests for approval"
        - from: "Managers"
          to: "CEO"
          type: risk
          note: "escalations to reduce personal risk"
        - from: "Compliance/Legal"
          to: "Managers"
          type: info
          note: "constraints and red flags"
      symptom_location: "Managers route too many decisions to CEO due to unclear risk boundaries."

  - artifact_type: CONTRADICTION_STATEMENT
    pipeline_step: 4
    payload:
      improve_x: "автономность решений на уровне менеджеров"
      worsen_y: "риск комплаенса/репутации и ошибок"
      statement_1l: "Если увеличиваем автономность решений у менеджеров, возрастает риск комплаенса и цена ошибки."
      measurement_hint: "X=% решений без эскалации; Y=# комплаенс инцидентов / репутационных кейсов."

  - artifact_type: IKR_CARD
    pipeline_step: 5
    payload:
      ikr_1l: "Менеджеры принимают решения в своих границах без эскалации, а риск контролируется простым фильтром без доп. бюджета."
      no_new_harm_clause: "Ошибки уровня комплаенса недопустимы; оргструктуру не менять."

  - artifact_type: HARD_BARRIER
    pipeline_step: 6
    payload:
      barrier_1l: "Нельзя одновременно полностью снять эскалации к CEO и при этом гарантировать нулевой комплаенс-риск без доп. бюджета."
      equivalent_to_step4: true

  - artifact_type: RESOURCE_MAP
    pipeline_step: 7
    payload:
      resources:
