artifact_pack:
  - artifact_type: CASE_SYMPTOM
    pipeline_step: 0
    payload:
      symptom_1l: "Делегирование “людям” есть, но решения всё равно возвращаются к собственнику через эскалации и согласования."

  - artifact_type: PROBLEM_OWNER_CARD
    pipeline_step: 1
    payload:
      owner_role: "CEO / Генеральный директор (30–200 сотрудников)"
      owner_scope: "Может определить границы решений, цену ошибки, уровни эскалации, допуски, KPI руководителей и правила “что считается решением”."
      constraints:
        - "Нельзя менять оргструктуру в этом квартале"
        - "Нельзя увеличивать бюджет (0 дополнительного финансирования)"
        - "Ошибки уровня “репутация/комплаенс” недопустимы"
      success_metric_hint: "Доля решений, принятых ниже уровня CEO без эскалаций + время CEO в операционке (час/нед)."

  - artifact_type: SYSTEM_BOUNDARY_MAP
    pipeline_step: 2
    payload:
