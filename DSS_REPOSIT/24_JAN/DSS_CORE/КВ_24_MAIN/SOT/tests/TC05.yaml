          category: info
          tied_to: "Compliance/Legal"
          note: "red flags"
        - name: "Escalation logs"
          category: info
          tied_to: "Escalation channel"
          note: "patterns of fear-based escalations"
        - name: "Manager decision authority"
          category: org
          tied_to: "Managers"
          note: "delegation base"
        - name: "CEO time as scarce resource"
          category: time
          tied_to: "CEO"
          note: "constraint"
        - name: "Customer contract clauses"
          category: trust
          tied_to: "Customers"
          note: "hard boundaries"
        - name: "Risk classification categories"
          category: info
          tied_to: "Risk/Compliance checklist"
          note: "low/med/high"
        - name: "Existing meetings (no new rituals)"
          category: time
          tied_to: "Managers"
          note: "use current cadence"
        - name: "Zero budget constraint"
          category: finance
          tied_to: "constraints"
          note: "no spend"

  - artifact_type: FORM_SELECTION
    pipeline_step: 8
    payload:
      PRIMARY_FORM: "№6 Ресурсоэффективность"
      BOUNDARY_CHECK:
        NEAREST_FORMS:
          - "№7 Реформатирование"
          - "№6 Ресурсоэффективность"
        WHY_NOT_X:
          - "Изменение формата полезно, но первично — задать границы риска и распределить ответственность."
          - "Реформатирование без риск-границ не убирает мотивацию “прикрыться” эскалацией."
          - "Нужен не новый формат коммуникации, а правило принятия решений по классам риска."
        WHY_NOT_Y:
          - "Нужна формализация 'решение в границах' через ресурсный фильтр риска."
          - "Без фильтра ресурсоэффективность может оптимизировать процесс, но не снизить страх персональной ответственности."
          - "Требуется дешёвый механизм контроля риска, а не перераспределение ресурсов."
      D_MARKER: "D4"
      TRIZ_CORE:
        CONTRADICTION_1L: "Нужно делегировать решения менеджерам, но нельзя допустить комплаенс-ошибки и репутационные риски."
        IKR_1L: "Решения принимаются на уровне менеджеров, а комплаенс-риски отсеиваются простым фильтром без эскалаций по умолчанию."
      PRINCIPLES_TO_ACTION:
        PRINCIPLES: [6, 25]
        ACTIONS:
          - "Универсальность: один короткий риск-фильтр и чек-лист комплаенса применим ко всем типовым решениям менеджеров."
          - "Самообслуживание: менеджер сам проходит фильтр, фиксирует доказательства в карточке решения и эскалирует только по правилу."
      IKR_TEST:
        Q1: "YES — используем текущий чек-лист и логи; бюджет 0."
        Q2: "YES — высокорисковые кейсы всё ещё эскалируются по правилу, не по страху."
      CONFIDENCE:
        score: 75
        justification: "структура валидна; требуется уточнение red flags в конкретной компании."

