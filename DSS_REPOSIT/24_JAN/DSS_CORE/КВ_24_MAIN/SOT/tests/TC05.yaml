              due: "T+7d"
              dependency: "матрица"
              checkpoint_metric: "список утверждён"
        - name: "Manager Adoption"
          owner: "COO"
          tasks:
            - task: "Встроить риск-класс в текущий шаблон решения/заявки"
              due: "T+7d"
              dependency: "матрица"
              checkpoint_metric: "≥70% заявок заполнены"
