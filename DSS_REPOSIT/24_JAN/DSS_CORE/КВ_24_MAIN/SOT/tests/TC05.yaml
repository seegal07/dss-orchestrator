              due: "T+14d"
              dependency: "логи"
              checkpoint_metric: "ошибки ↓"

  - artifact_type: RULE_UPDATE
    pipeline_step: 14
    payload:
      rule_id: "RULE-DELEGATION-RISK-01"
      rule_statement_if_then: "Если решение не содержит красного флага и классифицировано как green/yellow, то оно принимается менеджером без эскалации к CEO."
      criterion: "risk_class ∈ {green,yellow} AND red_flag=false"
      boundaries: "не применяется к red_flag=true и к решениям вне матрицы (новые типы) — они эскалируются"
      evidence_from_case: "симптом: эскалации из-за страха; ограничение: комплаенс ошибки недопустимы"
      test_case_action:
        add_or_update: add
        test_case_id: TC05
        expected_effect: "эскалации ↓ при сохранении комплаенса"
      version_note: "NON-CANON: rule update stored per case; canon unchanged"
      rationale_1l: "страх заменяется формальным фильтром риска"
