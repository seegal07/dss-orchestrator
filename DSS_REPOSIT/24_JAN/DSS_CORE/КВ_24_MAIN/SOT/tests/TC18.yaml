      boundaries: "Не применимо к задачам без дедлайна; дедлайн обязателен."
      evidence_from_case: "Симптом: директор перегружен ручным контролем, задачи висят."
      test_case_action:
        add_or_update: add
        test_case_id: TC18
        expected_effect: "дисциплина ↑, нагрузка директора ↓"
      version_note: "NON-CANON case rule; canon unchanged"
