            - "Настроить дашборд 1 экран с фильтром red."
            - "Правило эскалации: red > 24 часа → сообщение в чат + задача директору."
          D_assumptions_constraints:
            - "Статусы обновляются ежедневно."
          E_risks_failures:
            - "Статусы будут «рисоваться» и терять доверие."
          F_metrics:
