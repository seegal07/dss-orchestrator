  - artifact_type: RULE_UPDATE
    pipeline_step: 14
    payload:
      rule_id: "CASE-RULE-TC18-01"
      rule_statement_if_then: "Если задача становится red (просрочка >24ч), то система автоматически эскалирует в чат и ставит директору задачу реакции."
